{{- if and .Values.secret.create (not .Values.existingSecret) }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace (include "company-trust-index.secretName" .) }}
{{- $existingAppSecret := "" }}
{{- $existingDatabaseUrl := "" }}
{{- $existingMariaDbPassword := "" }}
{{- if $existingSecret }}
{{- $existingAppSecret = default "" (index $existingSecret.data "APP_SECRET" | default "" | b64dec) }}
{{- $existingDatabaseUrl = default "" (index $existingSecret.data "DATABASE_URL" | default "" | b64dec) }}
{{- $existingMariaDbPassword = default "" (index $existingSecret.data "MARIADB_PASSWORD" | default "" | b64dec) }}
{{- end }}
{{- $appSecret := default $existingAppSecret (default (randAlphaNum 32) .Values.secret.appSecret) }}
{{- $mariadbPassword := default $existingMariaDbPassword (default (randAlphaNum 24) .Values.secret.mariadbPassword) }}
{{- $databaseUrl := default $existingDatabaseUrl .Values.secret.databaseUrl }}
apiVersion: v1
kind: Secret
metadata:
    name: {{ include "company-trust-index.secretName" . }}
    labels:
        {{- include "company-trust-index.labels" . | nindent 8 }}
type: Opaque
stringData:
    APP_SECRET: {{ $appSecret | quote }}
    MARIADB_PASSWORD: {{ $mariadbPassword | quote }}
    DATABASE_URL: {{ default (printf "mysql://%s:%s@%s:3306/%s?serverVersion=mariadb-11.8.2&charset=utf8mb4" .Values.mariadb.username $mariadbPassword (include "company-trust-index.mariadbHost" .) .Values.mariadb.database) $databaseUrl | quote }}
{{- end }}
